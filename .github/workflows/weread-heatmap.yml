name: 微信阅读热力图自动生成

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00（北京时间 8:00）

  workflow_dispatch:
    inputs:
      start_year:
        description: '起始年份'
        required: false
        default: ''
      end_year:
        description: '结束年份'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-heatmap:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: 安装 Python 依赖
      run: pip install -r requirements.txt

    - name: 检查配置
      run: |
        if [ -z "$WEREAD_API_KEY" ]; then
          echo "❌ 错误: 未设置 WEREAD_API_KEY Secret"
          echo ""
          echo "请按以下步骤设置："
          echo "1. 进入仓库 Settings -> Secrets and variables -> Actions"
          echo "2. 点击 'New repository secret'"
          echo "3. 名称填写: WEREAD_API_KEY"
          echo "4. 值填写您的微信读书 API Key (wrk-xxxxxxxx)"
          echo "5. 保存后重新运行此 Action"
          exit 1
        fi
        echo "✅ WEREAD_API_KEY 已设置"
      env:
        WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}

    - name: 生成微信阅读热力图
      env:
        WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        NAME: ${{ vars.NAME || '微信阅读热力图' }}
        THEME_COLOR: ${{ vars.THEME_COLOR || 'github' }}
      run: |
        echo "🔥 开始生成微信阅读热力图..."

        rm -f heatmap.svg

        # 动态获取当前年份作为默认值
        THIS_YEAR=$(date +'%Y')
        START_YEAR="${{ github.event.inputs.start_year || vars.START_YEAR || '' }}"
        END_YEAR="${{ github.event.inputs.end_year || vars.END_YEAR || '' }}"
        START_YEAR=${START_YEAR:-$THIS_YEAR}
        END_YEAR=${END_YEAR:-$THIS_YEAR}

        python heatmap.py --start "$START_YEAR" --end "$END_YEAR" --theme "$THEME_COLOR" --stats

        if [ -f "heatmap.svg" ]; then
          echo "✅ 热力图生成成功"
          ls -la heatmap.svg
        else
          echo "❌ 热力图生成失败"
          exit 1
        fi

    - name: 提交并推送
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git add heatmap.svg

        if git diff --staged --quiet; then
          echo "📊 没有新的更改，跳过提交"
        else
          DATE=$(date +'%Y-%m-%d')
          git commit -m "Update heatmap [skip ci]"
          git push
        fi
